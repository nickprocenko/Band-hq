<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citrus – Band HQ</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ── Banner ──────────────────────────────────────────────────────────── -->
  <header class="banner">
    <div class="logo-wrap">
      <!-- Citrus slice SVG logo -->
      <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Citrus logo">
        <circle cx="50" cy="50" r="46" fill="#f5c518" stroke="#c9a000" stroke-width="3"/>
        <circle cx="50" cy="50" r="36" fill="#fff8dc" stroke="#e0b000" stroke-width="1.5"/>
        <!-- Citrus segments -->
        <line x1="50" y1="14" x2="50" y2="86" stroke="#e0b000" stroke-width="1.5"/>
        <line x1="14" y1="50" x2="86" y2="50" stroke="#e0b000" stroke-width="1.5"/>
        <line x1="22" y1="22" x2="78" y2="78" stroke="#e0b000" stroke-width="1.5"/>
        <line x1="78" y1="22" x2="22" y2="78" stroke="#e0b000" stroke-width="1.5"/>
        <!-- Center dot -->
        <circle cx="50" cy="50" r="5" fill="#f5c518" stroke="#c9a000" stroke-width="1"/>
      </svg>

      <div class="band-title">
        <span class="name">Citrus</span>
        <span class="tagline">Band HQ &nbsp;·&nbsp; Shared Workspace</span>
      </div>
    </div>
  </header>

    <div class="section-header">
      <h2>📁 File Structure</h2>
    </div>

    <!-- File-tree panel -->

      <div class="tree-toolbar">
        <button id="btn-expand">▶ Expand All</button>
        <button id="btn-collapse">▼ Collapse All</button>
      </div>
      <!-- Tree is injected here by main.js -->
